<!DOCTYPE html>
<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>TikTok One</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #00b140;
    font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  }
  .green-screen { width: 100%; height: 100vh; background: #00b140; }

  .notification {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%;
    background: #fff;
    border-radius: 24px 24px 0 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px calc(36px + env(safe-area-inset-bottom));
    transform: translateY(100%);
    animation: slideUp 0.55s cubic-bezier(0.32,0.72,0,1) 0.8s forwards;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.10);
  }
  @keyframes slideUp { to { transform: translateY(0); } }

  .handle {
    width: 46px; height: 4px;
    background: #ddd; border-radius: 2px;
    margin: 12px auto 20px;
  }

  .felicidades {
    color: #000;
    font-size: 26px; font-weight: 900;
    letter-spacing: 0.04em;
    text-align: center;
    margin-bottom: 14px;
  }

  .icon-wrap {
    width: 180px; height: 130px;
    margin-bottom: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-wrap img { width: 100%; height: 100%; object-fit: contain; }

  .tiktok-wordmark {
    color: #000;
    font-size: 34px; font-weight: 900;
    letter-spacing: -0.01em;
    line-height: 1;
    margin-bottom: 10px;
  }

  .affiliate-line {
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 14px;
  }
  .dash-cyan { width: 26px; height: 2px; background: #25f4ee; }
  .dash-pink  { width: 26px; height: 2px; background: #fe2c55; }
  .affiliate-text {
    font-size: 11.5px; font-weight: 700;
    letter-spacing: 0.13em;
    color: #25f4ee; white-space: nowrap;
  }
  .affiliate-text .program { color: #fe2c55; }

  .selected-text {
    color: #000;
    font-size: 18px; font-weight: 800;
    text-align: center;
    margin-bottom: 18px;
  }

  .chevrons {
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    animation: bounce 1.1s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(5px); }
  }
</style>
</head>
<body>
<div class="green-screen"></div>
<div class="notification">
  <div class="handle"></div>
  <div class="felicidades">¡Felicidades!</div>
  <div class="icon-wrap">
    <img src="11.png" alt="Trofeo Copa Mundial">
  </div>
  <div class="tiktok-wordmark">TikTok World</div>
  <div class="affiliate-line">
    <div class="dash-cyan"></div>
    <div class="affiliate-text">PROGRAMA DE <span class="program">AFILIADOS DE CLASE MUNDIAL</span></div>
    <div class="dash-pink"></div>
  </div>
  <div class="selected-text">¡El programa de recompensas se ha desbloqueado!</div>
  <div class="chevrons">
    <svg width="32" height="17" viewBox="0 0 32 17" fill="none">
      <polyline points="2,2 16,14 30,2" stroke="#bbb" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"></polyline>
    </svg>
    <svg width="32" height="17" viewBox="0 0 32 17" fill="none" style="opacity:0.45">
      <polyline points="2,2 16,14 30,2" stroke="#ccc" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"></polyline>
    </svg>
  </div>
</div>


</body></html>
